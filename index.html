<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thungkradas Q - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-sky: #e0f2fe; --accent-blue: #3b82f6; --text-dark: #1e3a8a; }
        body { background-color: var(--bg-sky); font-family: 'Prompt', sans-serif; color: var(--text-dark); background-image: radial-gradient(white 1px, transparent 1px), radial-gradient(white 1px, transparent 1px); background-size: 50px 50px; background-position: 0 0, 25px 25px; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; }
        .progress-container { height: 10px; background: #cbd5e1; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #60a5fa, #3b82f6); transition: width 0.8s ease; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #e2e8f0; padding: 12px; z-index: 50; height: 80px; display: flex; justify-content: space-around; align-items: center; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-32">
    <div class="max-w-4xl mx-auto mt-4 px-4">
        <div class="w-full h-32 sm:h-48 bg-white rounded-[32px] overflow-hidden shadow-lg border-4 border-white mb-8">
            <img src="ใส่_URL_รูปแบนเนอร์_ตรงนี้" class="w-full h-full object-cover">
        </div>

        <div class="flex justify-between items-end mb-8 px-2">
            <div>
                <h1 class="text-2xl font-bold text-blue-600">สถานะคิวงานวาด</h1>
                <p class="text-xs opacity-60">เช็คสถานะงานได้ที่นี่จ้า ✨</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-bold bg-blue-500 text-white px-3 py-1 rounded-full uppercase">Total</span>
                <p id="total-q" class="text-4xl font-bold text-blue-600">00</p>
            </div>
        </div>
        <div id="queue-list" class="space-y-3">
            <p class="text-center py-10 opacity-50">กำลังเชื่อมต่อข้อมูล...</p>
        </div>
    </div>

    <div id="detail-modal" class="modal" onclick="closeModal()">
        <div class="glass-card bg-white p-8 max-w-sm w-full mx-4 shadow-2xl" onclick="event.stopPropagation()">
            <h2 id="modal-id" class="text-blue-500 font-bold text-xl mb-1">Q-XX</h2>
            <h3 id="modal-name" class="text-2xl font-bold mb-4">ชื่อลูกค้า</h3>
            <div class="space-y-4 text-sm text-left">
                <div class="border-b pb-2"><p class="opacity-50 text-xs">รายละเอียด</p><p id="modal-detail">-</p></div>
                <div class="flex justify-between border-b pb-2"><span>Deadline</span><span id="modal-deadline" class="font-bold text-red-500">-</span></div>
                <div class="border-b pb-2"><p class="opacity-50 text-xs">หมายเหตุ</p><p id="modal-note" class="italic">-</p></div>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 bg-blue-500 text-white py-3 rounded-xl font-bold shadow-lg">ปิดหน้าต่าง</button>
        </div>
    </div>

    <nav class="nav-bottom max-w-4xl mx-auto left-0 right-0 rounded-t-3xl shadow-2xl">
        <a href="index.html" class="flex flex-col items-center text-blue-500 font-bold gap-1">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[10px]">HOME</span>
        </a>
        <a href="details.html" class="flex flex-col items-center text-gray-400 font-bold gap-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"></path></svg>
            <span class="text-[10px]">รายละเอียด</span>
        </a>
        <a href="prices.html" class="flex flex-col items-center text-gray-400 font-bold gap-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px]">ราคา</span>
        </a>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycby0BShFOZHG56avG_I3t7CzX_pIv2tJ5pCKbU4ISNgw1HCdWhkTasD5_9Mz8UQtrfaN/exec';
        async function fetchQueue() {
            const list = document.getElementById('queue-list');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                list.innerHTML = '';
                document.getElementById('total-q').innerText = data.length.toString().padStart(2, '0');
                data.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'glass-card p-4 flex items-center justify-between cursor-pointer hover:bg-white/90 shadow-sm mb-3';
                    row.onclick = () => openModal(item);
                    row.innerHTML = `<div class="flex items-center gap-4"><span class="font-bold text-blue-600">#${item.q_id}</span><span class="font-medium truncate w-32">${item.customer}</span></div>
                        <div class="flex items-center gap-4 justify-end flex-1"><div class="hidden sm:block w-32"><div class="progress-container"><div class="progress-fill" style="width: ${item.progress}"></div></div></div><span class="font-bold text-blue-500 text-sm">${item.progress}</span></div>`;
                    list.appendChild(row);
                });
            } catch (e) { list.innerHTML = '<p class="text-center text-red-400">โหลดไม่สำเร็จ</p>'; }
        }
        function openModal(item) {
            document.getElementById('modal-id').innerText = 'คิวที่ #' + item.q_id;
            document.getElementById('modal-name').innerText = item.customer;
            document.getElementById('modal-detail').innerText = item.details || '-';
            document.getElementById('modal-deadline').innerText = item.deadline || '-';
            document.getElementById('modal-note').innerText = item.note || '-';
            document.getElementById('detail-modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
        fetchQueue();
    </script>
</body>
</html>
